version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: darkpattern_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: darkpattern
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: darkpattern_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: darkpattern_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount local source so code changes are reflected without rebuilding
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=darkpattern
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
